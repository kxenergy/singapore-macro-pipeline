version: 2

models:
  - name: fct_sg_macro_monthly
    description: "Gold mart joining CPI, FX and trade into one macro intelligence table"
    columns:
      - name: period_date
        description: "Reference month"
        data_tests:
          - not_null
          - unique
      - name: cpi_value
        data_tests:
          - not_null
      - name: period_year
        data_tests:
          - not_null